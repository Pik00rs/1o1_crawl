<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balance Sim — Reactor Hollow</title>
<link rel="stylesheet" href="styles.css">
<style>
  .layout {
    display: grid;
    grid-template-columns: minmax(0, 320px) minmax(0, 1fr);
    gap: 24px;
  }
  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

  .controls .form-row { margin-bottom: 14px; }
  .controls input, .controls select { width: 100%; }

  .run-btn {
    width: 100%; padding: 14px; margin-top: 14px;
    background: var(--accent-cyan); color: #000;
    font-family: var(--font-display); font-weight: 800; font-size: 13px;
    letter-spacing: 2px; border: 1px solid var(--accent-cyan);
    cursor: pointer; text-transform: uppercase;
  }
  .run-btn:hover { background: #6ed5ff; }
  .run-btn[disabled] { opacity: 0.5; cursor: not-allowed; }

  .progress {
    margin-top: 14px;
    height: 4px; background: var(--bg-3);
  }
  .progress__fill {
    height: 100%;
    background: var(--accent-cyan);
    transition: width 0.2s;
    width: 0%;
  }
  .progress-text {
    font-family: var(--font-mono); font-size: 10px; color: var(--text-faint);
    letter-spacing: 1.5px; margin-top: 6px;
  }

  /* Heatmap */
  .heatmap-wrap {
    overflow-x: auto;
    padding: 8px;
    background: var(--bg-1);
    border: 1px solid var(--border);
  }
  table.heatmap {
    border-collapse: collapse;
    font-family: var(--font-mono);
    font-size: 11px;
    width: 100%;
  }
  table.heatmap th, table.heatmap td {
    padding: 8px 10px;
    text-align: center;
    border: 1px solid var(--border);
  }
  table.heatmap th {
    background: var(--bg-3);
    color: var(--text-dim);
    font-weight: normal;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  table.heatmap th:first-child, table.heatmap td:first-child {
    text-align: left;
    background: var(--bg-3);
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  td.cell {
    color: #fff;
    font-weight: 600;
    cursor: help;
    transition: filter 0.1s;
  }
  td.cell:hover { filter: brightness(1.3); }

  .legend {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 10px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 1.5px;
    flex-wrap: wrap;
  }
  .legend__swatch {
    display: inline-block;
    width: 16px; height: 12px;
    margin-right: 4px;
    vertical-align: middle;
  }

  .summary-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-top: 20px;
  }
  .summary-card {
    padding: 14px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    text-align: center;
  }
  .summary-card__num {
    font-family: var(--font-mono); font-size: 22px;
    color: #fff; font-weight: 700;
  }
  .summary-card__label {
    font-family: var(--font-mono); font-size: 9px;
    color: var(--text-faint); letter-spacing: 1.5px;
    text-transform: uppercase; margin-top: 4px;
  }
</style>
</head>
<body>
<div class="scanline-overlay"></div>

<header class="app-header">
  <div class="app-header__crumb">◤ MODULE 03 // COMBAT SIMULATOR ◢</div>
  <div class="app-header__title">BALANCE SIM</div>
  <div class="app-header__sub">Simulations batch // Heatmap winrate × niveau × build</div>
  <nav class="app-header__nav">
    <a href="../../index.html">▸ DASHBOARD</a>
    <a href="bestiary.html">BESTIAIRE</a>
    <a href="loot.html">LOOT</a>
    <a href="balance.html" class="active">BALANCE</a>
    <a href="playtest.html">PLAYTEST</a>
    <a href="../../game.html">▸ JEU</a>
  </nav>
</header>

<main class="app-main">

  <section class="layout">

    <!-- CONTROLS -->
    <div class="panel controls">
      <div class="panel__title">◢ PARAMÈTRES</div>

      <div class="form-row">
        <label>Combats / cellule</label>
        <input id="count" type="number" min="50" max="2000" step="50" value="500" />
      </div>

      <div class="form-row">
        <label>Niveau min</label>
        <input id="lvl-min" type="number" min="1" max="10" value="1" />
      </div>
      <div class="form-row">
        <label>Niveau max</label>
        <input id="lvl-max" type="number" min="1" max="10" value="10" />
      </div>

      <div class="form-row">
        <label>Build</label>
        <select id="build">
          <option value="balanced">Équilibré (4 affixes)</option>
          <option value="dps">DPS pur</option>
          <option value="tank">Tank</option>
          <option value="hybrid">Hybride</option>
          <option value="naked">Sans stuff</option>
        </select>
      </div>

      <div class="form-row">
        <label>Type ennemi</label>
        <select id="enemy-type">
          <option value="mob">Mob standard</option>
          <option value="elite">Elite</option>
          <option value="miniboss">Miniboss</option>
          <option value="boss">Boss</option>
          <option value="all">Tous (mix)</option>
        </select>
      </div>

      <button class="run-btn" id="run-btn">▶ LANCER LA SIMULATION</button>

      <div class="progress hidden" id="progress-wrap">
        <div class="progress__fill" id="progress-fill"></div>
      </div>
      <div class="progress-text" id="progress-text">Prêt</div>
    </div>

    <!-- RESULTS -->
    <div>
      <div class="text-xs uppercase faint mb-3">▸ HEATMAP WINRATE</div>
      <div class="heatmap-wrap" id="heatmap-host">
        <div class="empty-state" style="padding:48px;text-align:center;color:var(--text-faint)">
          Lance une simulation pour voir les résultats
        </div>
      </div>

      <div class="legend hidden" id="legend">
        <span>RANGE :</span>
        <span><span class="legend__swatch" style="background:#7e1f1f"></span>0-30%</span>
        <span><span class="legend__swatch" style="background:#a4451d"></span>30-50%</span>
        <span><span class="legend__swatch" style="background:#c79a35"></span>50-65%</span>
        <span><span class="legend__swatch" style="background:#7ca837"></span>65-80%</span>
        <span><span class="legend__swatch" style="background:#3a8856"></span>80%+</span>
      </div>

      <div class="summary-cards hidden" id="summary"></div>
    </div>

  </section>

</main>

<script>
// ==========================================
// COMBAT SIMULATOR (vanilla)
// ==========================================

// === Constantes balance (alignées avec engine-v3) ===

const ILVL_MULT_FLAT = {1:0.45, 2:0.60, 3:0.78, 4:0.98, 5:1.20, 6:1.50, 7:1.85, 8:2.25, 9:2.80, 10:3.50};
const ILVL_MULT_PCT  = {1:0.55, 2:0.70, 3:0.85, 4:0.98, 5:1.10, 6:1.25, 7:1.40, 8:1.55, 9:1.65, 10:1.75};

const ENEMY_ARCHETYPES = {
  mob:      { hpBase:35, dmgBase:[8,14], armor:3, role:'mob' },
  elite:    { hpBase:70, dmgBase:[11,18], armor:5, role:'elite' },
  miniboss: { hpBase:120, dmgBase:[14,22], armor:6, role:'miniboss' },
  boss:     { hpBase:180, dmgBase:[17,28], armor:7, role:'boss' },
};

function rand(min,max){ return min + Math.random()*(max-min); }
function rint(min,max){ return Math.floor(rand(min,max+1)); }

// === Player builder ===

function buildPlayer(level, buildType) {
  const baseHp = 50 + level * 7;
  const p = {
    hp: baseHp,
    maxHp: baseHp,
    armor: 0,
    damage: [4, 7],
    critChance: 5,
    critMultiplier: 50,
    lifesteal: 0,
    armorPenetration: 0,
    bonusFire: 0, bonusIce:0, bonusShock:0, bonusPoison:0,
    fireResist:0, iceResist:0, shockResist:0, poisonResist:0,
    dodgeChance: 5,
    blockChance: 0,
    hpRegen: 0,
    apBonus: 0,
  };
  if (buildType === 'naked') return p;

  const m = ILVL_MULT_FLAT[level];
  const mp = ILVL_MULT_PCT[level];

  if (buildType === 'dps') {
    p.damage = [Math.round(8*m), Math.round(14*m)];
    p.critChance += 12*mp;
    p.critMultiplier += 30*mp;
    p.armorPenetration += 5*m;
    p.bonusFire += 5*m;
  } else if (buildType === 'tank') {
    p.armor += 30*m;
    p.maxHp += 30*m; p.hp = p.maxHp;
    p.damage = [Math.round(6*m), Math.round(11*m)];
    p.fireResist += 15*mp; p.iceResist += 15*mp;
    p.dodgeChance += 6*mp;
    p.hpRegen += 3*m;
  } else if (buildType === 'hybrid') {
    p.damage = [Math.round(7*m), Math.round(12*m)];
    p.armor += 15*m;
    p.critChance += 6*mp;
    p.lifesteal += 4*mp;
    p.maxHp += 15*m; p.hp = p.maxHp;
  } else { // balanced
    p.damage = [Math.round(7*m), Math.round(13*m)];
    p.armor += 18*m;
    p.critChance += 8*mp;
    p.critMultiplier += 20*mp;
    p.maxHp += 18*m; p.hp = p.maxHp;
    p.bonusFire += 3*m;
    p.fireResist += 10*mp;
  }
  p.hpRegen = Math.min(p.hpRegen, 5);
  return p;
}

function buildEnemy(role, level) {
  const a = ENEMY_ARCHETYPES[role];
  const m = ILVL_MULT_FLAT[level];
  const hpMult = a.role === 'boss' ? 1.35 : a.role === 'elite' ? 1.15 : 1.0;
  return {
    hp: Math.round(a.hpBase * m * hpMult),
    maxHp: Math.round(a.hpBase * m * hpMult),
    damage: [Math.round(a.dmgBase[0]*m*0.95), Math.round(a.dmgBase[1]*m*0.95)],
    armor: Math.round(a.armor * m * 0.7),
    role: a.role,
  };
}

// === Combat ===

function calcDamage(att, tgt) {
  let dmg = rint(att.damage[0], att.damage[1]);
  // crit
  if (Math.random() * 100 < (att.critChance || 0)) {
    dmg = Math.round(dmg * (1 + (att.critMultiplier||50)/100));
  }
  // armor diminishing returns
  const eff = Math.max(0, (tgt.armor||0) - (att.armorPenetration||0));
  const reduction = Math.min(0.75, eff / (eff + 50));
  dmg = Math.max(1, Math.round(dmg * (1 - reduction)));
  return dmg;
}

function simulateOne(player, enemy) {
  let pl = { ...player };
  let en = { ...enemy };
  let turn = 0;
  while (pl.hp > 0 && en.hp > 0 && turn < 100) {
    // joueur
    if (Math.random() * 100 >= (en.dodgeChance||0)) {
      const d = calcDamage(pl, en);
      en.hp -= d;
      if (pl.lifesteal > 0) pl.hp = Math.min(pl.maxHp, pl.hp + Math.round(d * pl.lifesteal/100));
    }
    if (en.hp <= 0) return 'win';
    // ennemi
    if (Math.random() * 100 >= (pl.dodgeChance||0)) {
      const d = calcDamage(en, pl);
      pl.hp -= d;
    }
    if (pl.hp <= 0) return 'loss';
    // regen
    if (pl.hpRegen) pl.hp = Math.min(pl.maxHp, pl.hp + pl.hpRegen);
    turn++;
  }
  return pl.hp > 0 ? 'win' : 'loss';
}

function simulateMany(player, enemy, n) {
  let wins = 0;
  for (let i=0; i<n; i++) if (simulateOne(player, enemy) === 'win') wins++;
  return wins / n;
}

// === Heatmap render ===

function colorForRate(rate) {
  // rouge profond → orange → jaune → vert → vert vif
  if (rate < 0.3) return '#7e1f1f';
  if (rate < 0.5) return '#a4451d';
  if (rate < 0.65) return '#c79a35';
  if (rate < 0.80) return '#7ca837';
  return '#3a8856';
}

function renderHeatmap(matrix, levels, enemyRoles) {
  const host = document.getElementById('heatmap-host');
  host.innerHTML = '';
  const table = document.createElement('table');
  table.className = 'heatmap';

  // Header row
  const thead = document.createElement('tr');
  thead.innerHTML = '<th>Lvl ↓ / Ennemi →</th>' + enemyRoles.map(r => `<th>${r.toUpperCase()}</th>`).join('');
  table.appendChild(thead);

  for (const lvl of levels) {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>Lvl ${lvl}</td>`;
    for (const role of enemyRoles) {
      const rate = matrix[lvl] && matrix[lvl][role];
      if (rate === undefined) {
        tr.innerHTML += `<td>—</td>`;
        continue;
      }
      const td = document.createElement('td');
      td.className = 'cell';
      td.style.background = colorForRate(rate);
      td.textContent = Math.round(rate * 100) + '%';
      td.title = `Niveau ${lvl} vs ${role} : ${(rate*100).toFixed(1)}% winrate`;
      tr.appendChild(td);
    }
    table.appendChild(tr);
  }
  host.appendChild(table);

  // Legend & summary
  document.getElementById('legend').classList.remove('hidden');
  renderSummary(matrix, levels, enemyRoles);
}

function renderSummary(matrix, levels, enemyRoles) {
  const sum = document.getElementById('summary');
  sum.innerHTML = '';
  sum.classList.remove('hidden');

  const allRates = [];
  for (const l of levels) for (const r of enemyRoles) allRates.push(matrix[l][r]);
  const avg = allRates.reduce((a,b)=>a+b,0) / allRates.length;
  const min = Math.min(...allRates);
  const max = Math.max(...allRates);
  const inRange = allRates.filter(r => r >= 0.5 && r <= 0.75).length;

  const cards = [
    { num: (avg*100).toFixed(1)+'%', label:'Moy. winrate' },
    { num: (min*100).toFixed(1)+'%', label:'Min' },
    { num: (max*100).toFixed(1)+'%', label:'Max' },
    { num: `${inRange}/${allRates.length}`, label:'Cellules 50-75%' },
  ];
  for (const c of cards) {
    const el = document.createElement('div');
    el.className = 'summary-card';
    el.innerHTML = `<div class="summary-card__num">${c.num}</div><div class="summary-card__label">${c.label}</div>`;
    sum.appendChild(el);
  }
}

// === Run ===

async function run() {
  const count = +document.getElementById('count').value;
  const lmin = +document.getElementById('lvl-min').value;
  const lmax = +document.getElementById('lvl-max').value;
  const buildType = document.getElementById('build').value;
  const enemyType = document.getElementById('enemy-type').value;

  const levels = [];
  for (let l=lmin; l<=lmax; l++) levels.push(l);
  const enemyRoles = enemyType === 'all' ? ['mob','elite','miniboss','boss'] : [enemyType];

  document.getElementById('run-btn').disabled = true;
  document.getElementById('progress-wrap').classList.remove('hidden');
  const progFill = document.getElementById('progress-fill');
  const progText = document.getElementById('progress-text');

  const totalCells = levels.length * enemyRoles.length;
  let cellsDone = 0;

  const matrix = {};
  for (const lvl of levels) {
    matrix[lvl] = {};
    const player = buildPlayer(lvl, buildType);
    for (const role of enemyRoles) {
      const enemy = buildEnemy(role, lvl);
      matrix[lvl][role] = simulateMany(player, enemy, count);
      cellsDone++;
      const pct = (cellsDone / totalCells) * 100;
      progFill.style.width = pct + '%';
      progText.textContent = `${cellsDone}/${totalCells} cellules // ${cellsDone*count} combats simulés`;
      // yield to UI
      await new Promise(r => setTimeout(r, 0));
    }
  }

  renderHeatmap(matrix, levels, enemyRoles);
  document.getElementById('run-btn').disabled = false;
  progText.textContent = `✓ Terminé : ${totalCells*count} combats`;
}

document.getElementById('run-btn').addEventListener('click', run);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REROLLER — Reactor Hollow</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0a0510;
    color: #d8c8a0;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    padding: 20px;
    background: radial-gradient(ellipse at top, #1a0820 0%, #0a0510 70%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    border: 1px solid #3a2840;
    background: #14081e;
    margin-bottom: 24px;
    gap: 12px;
  }
  .header-title {
    font-size: 16px;
    color: #c040ff;
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(192,64,255,0.5);
  }
  .header-sub {
    font-size: 10px;
    color: #6a5878;
    letter-spacing: 1px;
    margin-top: 2px;
  }
  .back-btn {
    background: transparent;
    border: 1px solid #5a4828;
    color: #d8c8a0;
    padding: 10px 14px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: 1px;
    text-decoration: none;
    transition: all 0.15s;
    min-height: 40px;
    display: inline-flex;
    align-items: center;
  }
  .back-btn:active { border-color: #ffd060; color: #ffd060; transform: scale(0.96); }
  @media (hover: hover) {
    .back-btn:hover { border-color: #ffd060; color: #ffd060; }
  }

  .placeholder {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .placeholder-card {
    background: #14081e;
    border: 1px solid #3a2840;
    padding: 40px 32px;
    text-align: center;
    max-width: 420px;
    position: relative;
    overflow: hidden;
  }
  .placeholder-card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at top, rgba(192,64,255,0.5), transparent 70%);
    opacity: 0.15;
    pointer-events: none;
  }
  .placeholder-card::after {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 14px; height: 14px;
    border-top: 2px solid #c040ff;
    border-left: 2px solid #c040ff;
  }
  .placeholder-icon {
    font-size: 64px;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 12px rgba(192,64,255,0.5));
  }
  .placeholder-title {
    font-size: 24px;
    color: #c040ff;
    letter-spacing: 3px;
    text-shadow: 0 0 8px rgba(192,64,255,0.5);
    margin-bottom: 8px;
  }
  .placeholder-sub {
    font-size: 11px;
    color: #8a7898;
    letter-spacing: 1px;
    margin-bottom: 24px;
  }
  .placeholder-msg {
    font-size: 13px;
    color: #d8c8a0;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .placeholder-status {
    font-size: 10px;
    color: #6a5878;
    letter-spacing: 2px;
    padding: 8px 14px;
    border: 1px dashed #3a2840;
    display: inline-block;
  }
  .placeholder-status .v {
    color: #c040ff;
    font-weight: bold;
  }

  @media (max-width: 600px) {
    body { padding: 12px; }
    .header { padding: 10px 12px; }
    .header-title { font-size: 14px; }
    .placeholder-card { padding: 28px 20px; }
    .placeholder-icon { font-size: 48px; }
    .placeholder-title { font-size: 20px; letter-spacing: 2px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">🎲 REROLLER</div>
    <div class="header-sub">Reroll des stats d'items</div>
  </div>
  <a href="../../index.html" class="back-btn">◂ HUB</a>
</div>

<div class="placeholder">
  <div class="placeholder-card">
    <div class="placeholder-icon">🎲</div>
    <div class="placeholder-title">REROLLER</div>
    <div class="placeholder-sub">Reroll des stats d'items</div>
    <div class="placeholder-msg">Consomme des charges de reroll pour relancer les stats d'un item. Plus la rareté de l'item est haute, plus le coût est élevé. Les charges drop dans les donjons high-tier.</div>
    <div class="placeholder-status">STATUS · <span class="v">EN CONSTRUCTION</span></div>
  </div>
</div>

</body>
</html>
